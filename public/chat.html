<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedResponse - Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
  <style>
    :root { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --border: #e2e8f0; --muted: #64748b; }
    .dark { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --border: #334155; --muted: #94a3b8; }
    body { background: var(--bg); color: var(--text); transition: background 0.2s, color 0.2s; }
    .card { background: var(--card); border-color: var(--border); }
    .input-field { background: var(--card); border-color: var(--border); color: var(--text); }
    .muted { color: var(--muted); }
  </style>
</head>
<body class="h-screen flex flex-col">
  <div class="card border-b p-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <a href="index.html" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </a>
      <div>
        <h1 class="font-semibold">Patient #<span id="patientIdDisplay"></span></h1>
        <p class="muted text-sm"><span id="patientType"></span> - <span id="patientSeverity"></span></p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <span id="roleDisplay" class="px-3 py-1 text-xs font-medium rounded-full bg-indigo-100 text-indigo-800"></span>
      <button id="themeToggle" class="p-2 rounded-lg border card hover:opacity-80">
        <svg id="sunIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
        </svg>
        <svg id="moonIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-3"></div>

  <div class="card border-t p-4">
    <form id="chatForm" class="flex gap-3">
      <input id="messageInput" type="text" placeholder="Type your message..." class="input-field flex-1 p-3 rounded-lg border focus:ring-2 focus:ring-indigo-500 focus:outline-none">
      <button type="submit" class="bg-indigo-600 text-white px-6 py-3 rounded-lg font-medium hover:bg-indigo-700">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
      </button>
    </form>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const patientId = params.get('patientId');
    const role = params.get('role') || 'ambulance';

    document.getElementById('patientIdDisplay').textContent = patientId;
    document.getElementById('roleDisplay').textContent = role.charAt(0).toUpperCase() + role.slice(1);

    // Dark mode toggle
    const themeToggle = document.getElementById('themeToggle');
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');

    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.classList.add('dark');
      sunIcon.classList.remove('hidden');
      moonIcon.classList.add('hidden');
    }

    themeToggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      const isDark = document.documentElement.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      sunIcon.classList.toggle('hidden', !isDark);
      moonIcon.classList.toggle('hidden', isDark);
    });

    async function loadPatientInfo() {
      const res = await fetch(`http://localhost:3000/patient/${patientId}`);
      const patient = await res.json();
      if (patient) {
        document.getElementById('patientType').textContent = patient.type;
        document.getElementById('patientSeverity').textContent = patient.severity;
      }
    }

    async function loadMessages() {
      const res = await fetch(`http://localhost:3000/messages/${patientId}`);
      const data = await res.json();
      const container = document.getElementById('messages');
      
      container.innerHTML = data.messages.map(m => {
        const isMe = m.from === role;
        return `
          <div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
            <div class="max-w-[70%] ${isMe ? 'bg-indigo-600 text-white' : 'card border'} px-4 py-3 rounded-2xl ${isMe ? 'rounded-br-md' : 'rounded-bl-md'}">
              ${!isMe ? `<p class="text-xs font-medium text-indigo-600 mb-1">${m.from}</p>` : ''}
              <p>${m.text}</p>
            </div>
          </div>
        `;
      }).join('');
      
      container.scrollTop = container.scrollHeight;
    }

    document.getElementById('chatForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text) return;

      await fetch('http://localhost:3000/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ patientId: parseInt(patientId), from: role, text })
      });

      input.value = '';
      loadMessages();
    });

    loadPatientInfo();
    loadMessages();
    setInterval(loadMessages, 2000);
  </script>
</body>
</html>
