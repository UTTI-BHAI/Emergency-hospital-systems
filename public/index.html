<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedResponse - Emergency Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
  <style>
    :root { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --border: #e2e8f0; --muted: #64748b; }
    .dark { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --border: #334155; --muted: #94a3b8; }
    body { background: var(--bg); color: var(--text); transition: background 0.2s, color 0.2s; }
    .card { background: var(--card); border-color: var(--border); }
    .input-field { background: var(--card); border-color: var(--border); color: var(--text); }
    .muted { color: var(--muted); }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8">
  <div class="max-w-2xl mx-auto">
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
          </svg>
        </div>
        <div>
          <h1 class="text-2xl font-bold">MedResponse</h1>
          <p class="muted text-sm">Emergency Medical System</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button id="themeToggle" class="p-2 rounded-lg border card hover:opacity-80">
          <svg id="sunIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          <svg id="moonIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>
        <a href="doctor.html" class="px-4 py-2 text-sm border rounded-lg card hover:opacity-80">Doctor Portal</a>
      </div>
    </div>

    <div class="card border rounded-xl p-6 shadow-sm">
      <h2 class="text-xl font-semibold mb-6">Report Emergency</h2>
      <form id="emergencyForm" class="space-y-5">
        <div>
          <label class="block text-sm font-medium mb-2">Emergency Type</label>
          <select id="type" class="input-field w-full p-3 rounded-lg border focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            <option value="cardiac">Cardiac Emergency</option>
            <option value="trauma">Trauma</option>
            <option value="respiratory">Respiratory</option>
            <option value="neurological">Neurological</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Severity Level</label>
          <select id="severity" class="input-field w-full p-3 rounded-lg border focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            <option value="low">Low - Non-urgent</option>
            <option value="medium">Medium - Urgent</option>
            <option value="high">High - Very Urgent</option>
            <option value="critical">Critical - Life Threatening</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Description</label>
          <textarea id="description" rows="4" class="input-field w-full p-3 rounded-lg border focus:ring-2 focus:ring-indigo-500 focus:outline-none resize-none" placeholder="Describe the emergency situation..."></textarea>
        </div>
        <button type="submit" class="w-full bg-red-600 text-white py-3 rounded-lg font-medium hover:bg-red-700">
          Submit Emergency
        </button>
      </form>
    </div>

    <div id="result" class="hidden mt-6 card border rounded-xl p-6 shadow-sm">
      <div class="flex items-center gap-2 text-green-600 mb-4">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        <span class="font-semibold">Emergency Submitted</span>
      </div>
      <p class="mb-2">Patient ID: <span id="patientId" class="font-mono font-bold"></span></p>
      <p class="mb-4">Assigned Doctor: <span id="doctorName" class="font-medium"></span></p>
      <a id="chatLink" href="#" class="inline-flex items-center gap-2 bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
        Open Chat
      </a>
    </div>
  </div>

  <script>
    // Dark mode toggle
    const themeToggle = document.getElementById('themeToggle');
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');

    // Check saved preference
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.classList.add('dark');
      sunIcon.classList.remove('hidden');
      moonIcon.classList.add('hidden');
    }

    themeToggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      const isDark = document.documentElement.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      sunIcon.classList.toggle('hidden', !isDark);
      moonIcon.classList.toggle('hidden', isDark);
    });

    document.getElementById('emergencyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const res = await fetch('http://localhost:3000/emergency', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: document.getElementById('type').value,
          severity: document.getElementById('severity').value,
          description: document.getElementById('description').value
        })
      });
      const data = await res.json();
      document.getElementById('patientId').textContent = data.patientId;
      document.getElementById('doctorName').textContent = data.doctor ? data.doctor.name : 'No doctor available';
      document.getElementById('chatLink').href = `chat.html?patientId=${data.patientId}&role=ambulance`;
      document.getElementById('result').classList.remove('hidden');
    });
  </script>
</body>
</html>
